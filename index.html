<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitaVanni – Bhagavad Gita AI</title>
    <meta name="description"
        content="Discover eternal wisdom from the Bhagavad Gita through GitaVanni, your AI-powered spiritual guide.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --saffron-50: #FFFBF0;
            --saffron-100: #FEF3C7;
            --saffron-200: #FDE68A;
            --saffron-300: #F6B84B;
            --saffron-400: #F59E0B;
            --saffron-500: #D97706;
            --saffron-600: #B45309;
            --saffron-700: #92400E;

            --slate-50: #F8FAFC;
            --slate-100: #F1F5F9;
            --slate-200: #E2E8F0;
            --slate-300: #CBD5E1;
            --slate-400: #94A3B8;
            --slate-500: #64748B;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1E293B;
            --slate-900: #0F172A;

            --bg: #FFFFFF;
            --bg-side: #F9F9F9;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            color: var(--slate-800);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--slate-200);
            border-radius: 99px;
        }

        /* ══════════════════════════════════════
           SIDEBAR
        ══════════════════════════════════════ */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-side);
            border-right: 1px solid var(--slate-100);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: left 0.3s var(--ease);
            flex-shrink: 0;
        }

        /* Logo row */
        .sidebar-header {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--slate-100);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(140deg, var(--saffron-100) 0%, var(--saffron-200) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--saffron-600);
            flex-shrink: 0;
        }

        /* Peacock feather image sizing */
        .peacock-img {
            width: 112%;
            /* height: 100%; */
            /* display: block; */
            /* object-fit: contain; */
            /* border-radius: 0; */
            background: #f9f9f9;
        }

        .logo-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--slate-800);
            letter-spacing: -0.3px;
        }

        .logo-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--saffron-600);
            margin-top: 1px;
        }

        /* New chat */
        .new-chat-btn {
            margin: 14px 12px 8px;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--slate-200);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--slate-700);
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s var(--ease);
            font-family: inherit;
        }

        .new-chat-btn i {
            color: var(--saffron-600);
            font-size: 13px;
        }

        .new-chat-btn:hover {
            background: var(--saffron-50);
            border-color: var(--saffron-300);
            color: var(--saffron-700);
        }

        /* History */
        .history-label {
            padding: 10px 16px 6px;
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--slate-400);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 2px;
            cursor: pointer;
            color: var(--slate-600);
            font-size: 13px;
            transition: all 0.15s var(--ease);
        }

        .chat-item i.chat-icon {
            color: var(--slate-300);
            font-size: 12px;
            flex-shrink: 0;
        }

        .chat-item .chat-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover {
            background: var(--slate-100);
            color: var(--slate-800);
        }

        .chat-item.active {
            background: var(--saffron-50);
            color: var(--saffron-700);
        }

        .chat-item.active i.chat-icon {
            color: var(--saffron-400);
        }

        .delete-chat-btn {
            background: transparent;
            border: none;
            color: var(--slate-300);
            cursor: pointer;
            font-size: 13px;
            padding: 3px 5px;
            border-radius: 5px;
            opacity: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .chat-item:hover .delete-chat-btn {
            opacity: 1;
        }

        .delete-chat-btn:hover {
            background: #FEE2E2;
            color: #EF4444;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--slate-100);
            font-size: 11.5px;
            color: var(--slate-400);
            font-style: italic;
            line-height: 1.55;
        }

        .sidebar-footer strong {
            display: block;
            font-style: normal;
            font-size: 10px;
            font-weight: 600;
            color: var(--saffron-600);
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .empty-history {
            text-align: center;
            padding: 28px 12px;
            color: var(--slate-300);
            font-size: 12.5px;
        }

        .empty-history i {
            display: block;
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--slate-200);
        }

        /* ══════════════════════════════════════
           MAIN
        ══════════════════════════════════════ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            min-width: 0;
            overflow: hidden;
        }

        /* Header */
        .main-header {
            height: 58px;
            padding: 0 20px;
            border-bottom: 1px solid var(--slate-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(140deg, var(--saffron-100), var(--saffron-200));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--saffron-600);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--slate-800);
            letter-spacing: -0.3px;
        }

        .header-version {
            background: var(--saffron-600);
            color: #fff;
            font-size: 9.5px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 99px;
            letter-spacing: 0.2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            background: var(--saffron-50);
            border: 1px solid var(--saffron-100);

            color: var(--saffron-700);
            border-radius: 99px;
            padding: 4px 12px;
        }

        .dot-online {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22C55E;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(34, 197, 94, 0);
            }
        }

        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            background: var(--saffron-600);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-toggle:hover {
            background: var(--saffron-700);
        }

        /* ── Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        /* ══════════════════════════════════════
           WELCOME SCREEN  (ChatGPT / Gemini style)
        ══════════════════════════════════════ */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 24px;
            gap: 0;
            animation: fade-up 0.45s var(--ease) both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Greeting */
        .welcome-greeting {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.8px;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--slate-800) 30%, var(--saffron-600) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-sub {
            font-size: 15px;
            color: var(--slate-500);
            text-align: center;
            max-width: 532px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Suggestion chips row */
        .chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 680px;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--slate-200);
            border-radius: 99px;
            padding: 9px 18px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--slate-700);
            cursor: pointer;
            transition: all 0.18s var(--ease);
            font-family: inherit;
            white-space: nowrap;
        }

        .chip i {
            color: var(--saffron-500);
            font-size: 13px;
        }

        .chip:hover {
            background: var(--saffron-50);
            border-color: var(--saffron-300);
            color: var(--saffron-700);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(180, 83, 9, 0.10);
        }

        .chip:active {
            transform: translateY(0);
        }

        /* ══════════════════════════════════════
           MESSAGES
        ══════════════════════════════════════ */
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 0 8px;
            gap: 2px;
        }

        .message-row {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 4px 24px;
            animation: fade-up 0.28s var(--ease) both;
        }

        .message-inner {
            width: 100%;
            max-width: 940px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        /* User rows right-aligned */
        .message-row.user {
            justify-content: center;
        }

        .message-row.user .message-inner {
            justify-content: flex-end;
        }

        /* Avatar */
        .msg-av {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-av.user-av {
            background: linear-gradient(135deg, var(--saffron-500), var(--saffron-600));
            color: #fff;
            order: 2;
        }

        .msg-av.bot-av {
            background: linear-gradient(135deg, var(--saffron-100), var(--saffron-200));
            color: var(--saffron-600);
        }

        /* Bubble */
        .msg-bubble {
            display: flex;
            flex-direction: column;
            max-width: 78%;
        }

        .message-row.user .msg-bubble {
            align-items: flex-end;
            order: 1;
        }

        .message-row.bot .msg-bubble {
            align-items: flex-start;
        }

        .bubble-meta {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--slate-400);
            margin-bottom: 5px;
            padding: 0 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bubble-time {
            font-weight: 400;
            color: var(--slate-300);
        }

        .bubble-text {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.65;
            word-wrap: break-word;
        }

        /* User bubble */
        .message-row.user .bubble-text {
            background: linear-gradient(135deg, var(--saffron-600), var(--saffron-500));
            color: #fff;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 12px rgba(180, 83, 9, 0.18);
        }

        /* Bot bubble */
        .message-row.bot .bubble-text {
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            color: var(--slate-800);
            border-bottom-left-radius: 5px;
        }

        /* Verse badge */
        .verse-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--saffron-50);
            border: 1px solid var(--saffron-200);
            color: var(--saffron-700);
            font-size: 10.5px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 99px;
            margin-top: 8px;
        }

        /* Actions */
        .bubble-actions {
            display: flex;
            gap: 5px;
            margin-top: 7px;
            padding: 0 2px;
        }

        .act-btn {
            background: var(--bg);
            border: 1px solid var(--slate-200);
            color: var(--slate-500);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.16s var(--ease);
            font-family: inherit;
        }



        .act-btn:hover {
            background: var(--saffron-50);
            border-color: var(--saffron-200);
            color: var(--saffron-700);
        }



        /* ── Typing dots */
        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 18px;
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            width: fit-content;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--saffron-400);
            border-radius: 50%;
            animation: bounce-dot 1.3s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.18s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes bounce-dot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.45;
            }

            30% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }

        /* line animation */
        .line-animation {
            display: inline;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .line-animation span {
            display: inline-block;
            width: 100%;
            opacity: 0;
            transform: translateY(6px);
            animation: line-in 0.25s forwards;
        }

        @keyframes line-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ══════════════════════════════════════
           INPUT AREA
        ══════════════════════════════════════ */
        .input-area {
            padding: 12px 24px 16px;
            background: var(--bg);
            border-top: 1px solid var(--slate-100);
            flex-shrink: 0;
        }

        .input-shell {
            max-width: 940px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border: 1.5px solid var(--slate-200);
            border-radius: 30px;
            padding: 5px 5px 5px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-box:focus-within {
            border-color: var(--saffron-400);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.10), 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-box textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14.5px;
            color: var(--slate-800);
            font-family: inherit;
            resize: none;
            max-height: 160px;
            line-height: 1.55;
            padding: 9px 0;
            overflow-y: auto;
        }

        .input-box textarea::placeholder {
            color: var(--slate-400);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            background: var(--saffron-600);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.18s var(--ease);
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--saffron-700);
            transform: scale(1.06);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--slate-200);
            color: var(--slate-400);
            cursor: not-allowed;
        }

        .input-footer {
            text-align: center;
            font-size: 11px;
            color: var(--slate-400);
            margin-top: 8px;
        }

        /* ══════════════════════════════════════
           OVERLAY
        ══════════════════════════════════════ */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ══════════════════════════════════════
           MOBILE
        ══════════════════════════════════════ */
        @media (max-width: 768px) {
            body {
                overflow: hidden;
                position: relative;
            }

            .sidebar {
                position: fixed;
                left: -270px;
                top: 0;
                z-index: 1000;
                height: 100%;
                width: 260px;
                transition: left 0.3s var(--ease);
                box-shadow: 4px 0 24px rgba(0, 0, 0, 0.08);
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                width: 100%;
            }

            .menu-toggle {
                display: flex;
            }

            .online-badge {
                display: none;
            }

            .welcome-greeting {
                font-size: 26px;
            }

            .welcome-sub {
                font-size: 14px;
                margin-bottom: 28px;
            }

            .chips-row {
                gap: 8px;
            }

            .chip {
                font-size: 12.5px;
                padding: 8px 14px;
            }

            .input-area {
                padding: 10px 14px 14px;
            }

            .input-box textarea {
                font-size: 13px;
            }

            .message-row {
                padding: 3px 14px;
            }

            .msg-bubble {
                max-width: 88%;
            }

            .bubble-text {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .welcome-greeting {
                font-size: 22px;
            }

            .msg-bubble {
                max-width: 94%;
            }

            .chips-row {
                flex-direction: column;
                align-items: center;
            }

            .chip {
                width: 100%;
                max-width: 320px;
                border-radius: 12px;
                justify-content: flex-start;
            }
        }

        /* ════════════════════════════════
           NAME ONBOARDING MODAL
        ════════════════════════════════ */
        .name-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: modal-bg-in 0.3s ease both;
        }

        @keyframes modal-bg-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .name-modal {
            background: #fff;
            border-radius: 28px;
            padding: 44px 40px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
            animation: modal-in 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            position: relative;
            overflow: hidden;
        }

        .name-modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--saffron-400), var(--saffron-600), #7C3AED);
        }

        @keyframes modal-in {
            from {
                opacity: 0;
                transform: scale(0.88) translateY(24px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-logo {
            width: 76px;
            height: 76px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--saffron-50), var(--saffron-100));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(180, 83, 9, 0.12);
        }

        .modal-logo img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .modal-title {
            font-size: 23px;
            font-weight: 700;
            color: var(--slate-800);
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }

        .modal-sub {
            font-size: 14px;
            color: var(--slate-500);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .modal-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--slate-500);
            text-align: left;
            margin-bottom: 7px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .modal-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--slate-200);
            border-radius: 14px;
            font-size: 15.5px;
            font-family: inherit;
            color: var(--slate-800);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--slate-50);
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input:focus {
            border-color: var(--saffron-400);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.10);
            background: #fff;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--saffron-600), var(--saffron-400));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 18px rgba(180, 83, 9, 0.28);
            letter-spacing: 0.1px;
        }

        .modal-btn:hover {
            background: linear-gradient(135deg, var(--saffron-700), var(--saffron-500));
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(180, 83, 9, 0.35);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .modal-skip {
            margin-top: 14px;
            font-size: 12.5px;
            color: var(--slate-400);
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
            padding: 4px;
        }

        .modal-skip:hover {
            color: var(--slate-600);
        }

        /* User name pill in sidebar */
        .user-name-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--saffron-50);
            border: 1px solid var(--saffron-100);
            border-radius: 10px;
            font-size: 12px;
            color: var(--saffron-700);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            margin: 20px;
        }

        .user-name-pill:hover {
            background: var(--saffron-100);
        }

        .user-name-pill i {
            font-size: 16px;
            color: var(--saffron-500);
        }

        .user-name-pill .pill-label {
            font-size: 10px;
            color: var(--saffron-500);
            font-weight: 400;
            display: block;
        }

        .lang-select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--saffron-200);
            background: var(--saffron-50);
            color: var(--saffron-700);
            font-size: 13.5px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            margin-right: 8px;
            font-weight: 500;
        }

        .lang-select:hover,
        .lang-select:focus {
            border-color: var(--saffron-400);
            background: var(--saffron-100);
        }

        @media (max-width: 480px) {
            .name-modal {
                padding: 36px 22px 28px;
                border-radius: 22px;
            }

            .modal-title {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- ╔══ NAME ONBOARDING MODAL ══╗ -->
    <div class="name-modal-backdrop" id="nameModalBackdrop" style="display:none">
        <div class="name-modal">
            <div class="modal-logo">
                <img src="logo1.png" alt="GitaVanni"
                    onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:30px>🦚</span>'">
            </div>
            <div class="modal-title">Namaste 🙏</div>
            <p class="modal-sub">Welcome to GitaVanni — your personal<br>Bhagavad Gita guide. What's your name?</p>
            <div class="modal-label">Your Name</div>
            <input class="modal-input" id="nameInput" type="text" placeholder="e.g. Arjuna, Shyam…" maxlength="30"
                autocomplete="given-name" spellcheck="false" />
            <button class="modal-btn" onclick="saveName()">Begin My Journey ✨</button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="logo1.png" alt="GitaVanni" class="peacock-img">
                </div>
                <div>
                    <div class="logo-name">GitaVanni</div>
                    <div class="logo-tag">Spiritual AI Guide</div>
                </div>
            </div>
        </div>

        <button class="new-chat-btn" onclick="createNewChat()">
            <i class="fas fa-plus"></i> New conversation
        </button>

        <div class="history-label">Recent</div>

        <div class="chat-history">
            <div id="chatList"></div>
        </div>
        <!-- User name pill (shown after name is set) -->
        <div class="user-name-pill" id="userNamePill" style="display:none" onclick="promptRename()"
            title="Click to change name">
            <i class="fas fa-circle-user"></i>
            <div>
                <span class="pill-label">Logged in as</span>
                <span id="userNameText"></span>
            </div>
        </div>


    </aside>

    <!-- ══ MAIN ══ -->
    <div class="main">
        <header class="main-header">
            <div class="header-left">

                <span class="header-title">GitaVanni</span>
                <span class="header-version">3.0</span>
            </div>
            <div class="header-right">
                  <select id="langSelect" class="lang-select" title="Change response language">
                    <option value="English">ENG</option>
                    <option value="Hindi">HIN</option>
                    <option value="Gujarati">GUJ</option>
                </select>

                <button class="menu-toggle" id="menuToggleBtn" onclick="toggleSidebar()" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-shell">
                <div class="input-box">
                    <textarea id="question" placeholder="Ask anything about the Bhagavad Gita…" rows="1"
                        autocomplete="off" spellcheck="false"></textarea>
                    <button class="send-btn" id="sendButton" onclick="sendMessage()" aria-label="Send">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div class="input-footer">
                    GitaVanni can make mistakes.
                </div>
            </div>
        </div>
    </div>

     <script>
        let userName = localStorage.getItem('gitaUserName') || '';

        function showNameModal() {
            const bd = document.getElementById('nameModalBackdrop');
            bd.style.display = 'flex';

            setTimeout(() => {
                const ni = document.getElementById('nameInput');
                if (ni) ni.focus();
            }, 120);
        }

        window.saveName = function (skip = false) {
            const val = document.getElementById('nameInput').value.trim();
            userName = skip ? '' : (val || '');

            localStorage.setItem('gitaUserName', userName);
            localStorage.setItem('gitaOnboarded', '1');

            document.getElementById('nameModalBackdrop').style.display = 'none';
            updateUserNameDisplay();

            if (!currentChatId || !Object.keys(chats).length) {
                createNewChat();
            } else {
                renderChatList();
                renderChat();
            }
        };

        window.promptRename = function () {
            const ni = document.getElementById('nameInput');
            if (ni) ni.value = userName;
            showNameModal();
        };

        document.addEventListener('DOMContentLoaded', () => {
            const ni = document.getElementById('nameInput');

            if (ni) {
                ni.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        saveName();
                    }
                });
            }

            updateUserNameDisplay();
        });

        function updateUserNameDisplay() {
            const pill = document.getElementById('userNamePill');
            const txt = document.getElementById('userNameText');

            if (pill) {
                if (userName) {
                    pill.style.display = 'flex';
                    if (txt) txt.textContent = userName;
                } else {
                    pill.style.display = 'none';
                }
            }
        }

        let chats = JSON.parse(localStorage.getItem("gitaChatsV4")) || {};
        let currentChatId = localStorage.getItem("currentChatIdV4") || null;

        const chatEl = document.getElementById("chatContainer");
        const chatList = document.getElementById("chatList");
        const inputEl = document.getElementById("question");
        const sendBtn = document.getElementById("sendButton");

        let isGenerating = false;

        const suggestions = [
            {
                icon: 'fa-heart',
                title: 'Karma Yoga',
                q: 'What is karma yoga and how to practice it according to Bhagavad Gita?'
            },
            {
                icon: 'fa-scale-balanced',
                title: 'Dharma',
                q: 'Explain the concept of dharma with examples from the Gita'
            },
            {
                icon: 'fa-infinity',
                title: 'Moksha',
                q: 'What is moksha and how can one attain it according to Krishna?'
            },
            {
                icon: 'fa-brain',
                title: 'Mind Control',
                q: 'How to control the restless mind according to Krishna?'
            }
        ];

        function showWelcomeScreen() {
            const div = document.createElement("div");
            div.className = "welcome-screen";
            div.id = "welcomeScreen";

            const chipsHtml = suggestions.map(s => `
                <button class="chip" onclick="askSuggestion('${s.q.replace(/'/g, "\\'")}')">
                    <i class="fas ${s.icon}"></i>${s.title}
                </button>
            `).join('');

            const greetName = userName || 'Friend';

            div.innerHTML = `
                <div class="welcome-greeting">Good ${getTimeOfDay()}, ${greetName} 🙏</div>
                <p class="welcome-sub">
                    &ldquo;Ask anything from the Bhagavad Gita &mdash; karma, dharma, moksha, or life.&rdquo;
                </p>
                <div class="chips-row">${chipsHtml}</div>
            `;

            chatEl.appendChild(div);
        }

        function getTimeOfDay() {
            const h = new Date().getHours();

            if (h < 12) return 'Morning';
            if (h < 17) return 'Afternoon';
            return 'Evening';
        }

        window.askSuggestion = function (q) {
            inputEl.value = q;
            autoResize(inputEl);
            sendMessage();
        };

        function createNewChat() {
            const id = "chat_" + Date.now();

            chats[id] = [];
            currentChatId = id;

            saveChats();
            renderChatList();
            renderChat();

            if (window.innerWidth <= 768) toggleSidebar();
        }

        function saveChats() {
            localStorage.setItem("gitaChatsV4", JSON.stringify(chats));
            localStorage.setItem("currentChatIdV4", currentChatId);
        }

        window.deleteChat = function (id, e) {
            e.stopPropagation();

            if (!chats[id]) return;

            delete chats[id];

            if (currentChatId === id) {
                const rem = Object.keys(chats);
                currentChatId = rem.length ? rem[0] : null;
            }

            saveChats();
            renderChatList();
            renderChat();
        };

        function renderChatList() {
            chatList.innerHTML = "";

            const ids = Object.keys(chats);

            if (!ids.length) {
                chatList.innerHTML = `
                    <div class="empty-history">
                        <i class="fas fa-comment-slash"></i>
                        No conversations yet
                    </div>
                `;
                return;
            }

            ids.sort((a, b) => b.localeCompare(a)).forEach(id => {
                const div = document.createElement("div");

                div.className = "chat-item" + (id === currentChatId ? " active" : "");

                const firstMessage = chats[id][0]?.content || "";
                const label = firstMessage
                    ? firstMessage.substring(0, 28) + (firstMessage.length > 28 ? '…' : '')
                    : "New Chat";

                const icon = chats[id][0] ? 'fa-comment' : 'fa-plus';

                div.innerHTML = `
                    <i class="fas ${icon} chat-icon"></i>
                    <span class="chat-text">${escapeHtml(label)}</span>
                    <button class="delete-chat-btn" onclick="deleteChat('${id}', event)" title="Delete">
                        <i class="fas fa-xmark"></i>
                    </button>
                `;

                div.onclick = (e) => {
                    if (e.target.closest('.delete-chat-btn')) return;

                    currentChatId = id;
                    saveChats();
                    renderChatList();
                    renderChat();

                    if (window.innerWidth <= 768) toggleSidebar();
                };

                chatList.appendChild(div);
            });
        }

        function renderChat() {
            chatEl.innerHTML = "";

            if (!currentChatId || !chats[currentChatId] || !chats[currentChatId].length) {
                showWelcomeScreen();
                return;
            }

            const area = document.createElement('div');
            area.className = 'messages-area';
            chatEl.appendChild(area);

            chats[currentChatId].forEach(m => addMessage(m.content, m.role, false, area));

            chatEl.scrollTop = chatEl.scrollHeight;
            updateRegenerateButtons();
        }

        function updateRegenerateButtons() {
            const regenBtns = document.querySelectorAll('.regen-btn');

            regenBtns.forEach(b => b.style.display = 'none');

            if (regenBtns.length > 0) {
                regenBtns[regenBtns.length - 1].style.display = 'flex';
            }
        }

        function formatMessage(txt) {
            if (/chapter|verse/i.test(txt)) {
                txt = txt.replace(/(Chapter \d+,\s*Verse \d+)/g, '\n📖 $1\n');
                txt = txt.replace(/(\d+\.\s+)/g, '\n$1');
            }

            return txt;
        }

        async function animateText(el, txt, delay = 15) {
            el.innerHTML = '';

            for (const line of txt.split('\n')) {
                const s = document.createElement('span');
                s.textContent = line + '\n';
                s.style.display = 'inline-block';
                s.style.width = '100%';

                el.appendChild(s);

                await new Promise(r => setTimeout(r, delay * 4));

                chatEl.scrollTop = chatEl.scrollHeight;
            }
        }

        function getMessagesArea() {
            let area = chatEl.querySelector('.messages-area');

            if (!area) {
                area = document.createElement('div');
                area.className = 'messages-area';
                chatEl.appendChild(area);
            }

            return area;
        }

        function addMessage(content, role, animate = true, container = null) {
            const area = container || getMessagesArea();
            const fmt = formatMessage(content);
            const time = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            const isUser = role === 'user';
            const msgId = `mc-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;

            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const actionsForUser = `
                <div class="bubble-actions">
                    <button class="act-btn" onclick="copyMessage(this)">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>
            `;

            if (isUser) {
                const displayName = userName || 'You';

                row.innerHTML = `
                    <div class="message-inner">
                        <div class="msg-bubble">
                            <div class="bubble-meta">
                                <span>${escapeHtml(displayName)}</span>
                                <span class="bubble-time">${time}</span>
                            </div>
                            <div class="bubble-text">${escapeHtml(fmt).replace(/\n/g, '<br>')}</div>
                            ${actionsForUser}
                        </div>
                    </div>
                `;
            } else {
                row.innerHTML = `
                    <div class="message-inner">
                        <div class="msg-av bot-av">
                            <img src="logo1.png" alt="" class="peacock-img">
                        </div>
                        <div class="msg-bubble">
                            <div class="bubble-meta">
                                <span>Gita Wisdom</span>
                                <span class="bubble-time">${time}</span>
                            </div>
                            <div class="bubble-text">
                                <div class="message-content" style="line-height: 1.8;" id="${msgId}">
                                    ${animate ? '' : escapeHtml(fmt).replace(/\n/g, '<br>')}
                                </div>
                            </div>
                            <div class="bubble-actions">
                                <button class="act-btn" onclick="copyMessage(this)">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                                <button class="act-btn regen-btn" onclick="regenerateResponse(this)" style="display:none">
                                    <i class="fas fa-rotate-right"></i> Regenerate
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            area.appendChild(row);
            chatEl.scrollTop = chatEl.scrollHeight;

            if (animate && !isUser) {
                const contentEl = row.querySelector('.message-content');
                animateText(contentEl, fmt, 15);
            }
        }

        window.copyMessage = function (btn) {
            const el = btn.closest('.msg-bubble').querySelector('.bubble-text, .message-content');

            navigator.clipboard.writeText(el.innerText).catch(() => { });

            const oldHtml = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            btn.style.cssText = 'background:#D1FAE5;border-color:#6EE7B7;color:#065F46';

            setTimeout(() => {
                btn.innerHTML = oldHtml;
                btn.style.cssText = '';
            }, 2000);
        };

        function showTyping() {
            const area = getMessagesArea();
            const row = document.createElement('div');

            row.className = 'message-row bot';
            row.id = 'typingRow';

            row.innerHTML = `
                <div class="message-inner">
                    <div class="msg-av bot-av">
                        <img src="logo1.png" alt="" class="peacock-img">
                    </div>
                    <div class="msg-bubble">
                        <div class="bubble-meta">
                            <span>Gita Wisdom</span>
                        </div>
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;

            area.appendChild(row);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingRow')?.remove();
        }

        window.regenerateResponse = async function (btn) {
            if (isGenerating || !currentChatId) return;

            const chatLog = chats[currentChatId];

            if (chatLog.length < 2) return;
            if (chatLog[chatLog.length - 1].role !== 'bot' || chatLog[chatLog.length - 2].role !== 'user') return;

            const lastUserQuestion = chatLog[chatLog.length - 2].content;

            chatLog.pop();
            saveChats();

            const bubbleRow = btn.closest('.message-row.bot');
            if (bubbleRow) bubbleRow.remove();

            isGenerating = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question: lastUserQuestion,
                        language: document.getElementById('langSelect').value
                    })
                });

                if (!res.ok) throw new Error('Bad response');

                const data = await res.json();

                hideTyping();

                chats[currentChatId].push({
                    role: "bot",
                    content: data.answer
                });

                addMessage(data.answer, "bot", true);
                saveChats();

            } catch (err) {
                hideTyping();
                addMessage("⚠️ Unable to connect to the server. Please check your connection and try again.", "bot", true);
                console.error(err);
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                updateRegenerateButtons();
            }
        };

        async function sendMessage() {
            const question = inputEl.value.trim();

            if (!question || isGenerating) return;

            document.getElementById('welcomeScreen')?.remove();

            if (!currentChatId) createNewChat();

            chats[currentChatId].push({
                role: "user",
                content: question
            });

            addMessage(question, "user", false);

            inputEl.value = "";
            autoResize(inputEl);

            saveChats();
            renderChatList();

            isGenerating = true;
            sendBtn.disabled = true;

            showTyping();

            try {
                const res = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question: question,
                        language: document.getElementById('langSelect').value
                    })
                });

                if (!res.ok) throw new Error('Bad response');

                const data = await res.json();

                hideTyping();

                chats[currentChatId].push({
                    role: "bot",
                    content: data.answer
                });

                addMessage(data.answer, "bot", true);
                saveChats();

            } catch (err) {
                hideTyping();
                addMessage("⚠️ Unable to connect to the server. Please check your connection and try again.", "bot", true);
                console.error(err);
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                updateRegenerateButtons();
            }
        }

        window.toggleSidebar = function () {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('sidebarOverlay');

            s.classList.toggle('active');
            o.classList.toggle('active');

            document.body.style.overflow = s.classList.contains('active') ? 'hidden' : '';
        };

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('sidebarOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        inputEl.addEventListener('input', () => autoResize(inputEl));

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        showNameModal();
    </script>

</body>

</html>
